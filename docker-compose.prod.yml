services:
  postgres:

    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:

    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  api:

    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  dashboard:

    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
