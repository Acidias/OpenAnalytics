services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-openanalytics}
      POSTGRES_USER: ${DB_USER:-openanalytics}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openanalytics} -d ${DB_NAME:-openanalytics}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["sh", "-ec", "exec redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      OA_ENV: ${OA_ENV:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-openanalytics}
      DB_USER: ${DB_USER:-openanalytics}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_URL: redis://default:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${DASHBOARD_PORT:-3100}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: ${API_PORT:-3101}
      HOST: 0.0.0.0
    command:
      - sh
      - -ec
      - |
        if [ "${OA_ENV:-dev}" != "dev" ] && [ "${OA_ENV:-dev}" != "development" ]; then
          if [ "${DB_USER:-openanalytics}" = "openanalytics" ] || [ "${DB_USER:-openanalytics}" = "postgres" ]; then
            echo "ERROR: DB_USER must be a non-default value when OA_ENV is not dev." >&2
            exit 1
          fi
          if [ "${DB_PASSWORD:-changeme}" = "changeme" ] || [ "${DB_PASSWORD:-changeme}" = "openanalytics" ] || [ "${DB_PASSWORD:-changeme}" = "postgres" ]; then
            echo "ERROR: DB_PASSWORD must be changed from default values when OA_ENV is not dev." >&2
            exit 1
          fi
          if [ "$${#DB_PASSWORD}" -lt 16 ]; then
            echo "ERROR: DB_PASSWORD must be at least 16 characters when OA_ENV is not dev." >&2
            exit 1
          fi
        fi
        exec node dist/server.js
    ports:
      - "${API_PORT:-3101}:${API_PORT:-3101}"
    volumes:
      - ./packages/tracker/dist/oa.js:/app/packages/api/public/oa.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./packages/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3101}
        NEXT_PUBLIC_TRACKER_URL: ${TRACKER_URL:-}
    environment:
      HOSTNAME: 0.0.0.0
      PORT: ${DASHBOARD_PORT:-3100}
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3101}
      NEXT_PUBLIC_TRACKER_URL: ${TRACKER_URL:-}
    ports:
      - "${DASHBOARD_PORT:-3100}:${DASHBOARD_PORT:-3100}"
    depends_on:
      - api

volumes:
  pgdata:
