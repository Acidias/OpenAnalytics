services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: openanalytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./packages/api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: openanalytics
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: http://localhost:${DASHBOARD_PORT:-3100}
      PORT: 3001
      HOST: 0.0.0.0
    ports:
      - "${API_PORT:-3101}:3001"
    volumes:
      - ./packages/tracker/dist/oa.js:/app/public/oa.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./packages/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3101}
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3101}
    ports:
      - "${DASHBOARD_PORT:-3100}:3000"
    depends_on:
      - api

volumes:
  pgdata:
