version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: simple_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - analytics_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - analytics_network

  api:
    build: ./packages/api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/simple_analytics
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-jwt-secret-change-this
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - analytics_network

  dashboard:
    build: ./packages/dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - analytics_network

volumes:
  postgres_data:

networks:
  analytics_network:
    driver: bridge