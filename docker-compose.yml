services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: openanalytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./packages/api
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  dashboard:
    build: ./packages/dashboard
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
